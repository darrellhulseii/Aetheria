<style>

<script>
'use strict';
// ================================================================
//  DRAGONFLIGHT: MYTHIC RIDERS – AETHERIA
//  Single-file HTML5 Canvas Game  |  v2.0 Mobile Enhanced
//  Virtual Joystick  ·  10 Mythic Cities  ·  Historical Quotes
// ================================================================

const canvas = document.getElementById(‘c’);
const ctx    = canvas.getContext(‘2d’);
let W=0,H=0;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
window.addEventListener(‘resize’,resize); resize();

const S={MENU:‘menu’,SELECT:‘select’,MAP:‘map’,HUB:‘hub’,TRAIN:‘train’,FLIGHT:‘flight’,CODEX:‘codex’};
let state=S.MENU;

// ── VIRTUAL JOYSTICK ─────────────────────────────────────────
const JOY={
active:false, tid:-1,
bx:0,by:0,          // base center (set on layout)
cx:0,cy:0,          // current thumb
dx:0,dy:0,          // normalized -1..1
radius:62,
knobR:26,
visible:false
};
function joyLayout(){ JOY.bx=JOY.radius+18; JOY.by=H-JOY.radius-18; JOY.cx=JOY.bx; JOY.cy=JOY.by; }
window.addEventListener(‘resize’,joyLayout); joyLayout();

// ── INPUT ────────────────────────────────────────────────────
const keys={};
const mouse={x:W/2,y:H/2,down:false,dx:0,dy:0,px:0,py:0};
const clickQ=[];
const activeTouches={};

// Button touch IDs (so joystick and buttons don’t conflict)
const btnTouches={boost:-1,breath:-1,up:-1,down:-1};

window.addEventListener(‘keydown’,e=>{
keys[e.code]=true;
if([‘Space’,‘ArrowUp’,‘ArrowDown’,‘ArrowLeft’,‘ArrowRight’].includes(e.code))e.preventDefault();
});
window.addEventListener(‘keyup’,e=>{ keys[e.code]=false; });

canvas.addEventListener(‘mousedown’,e=>{ mouse.down=true; mouse.px=mouse.x; mouse.py=mouse.y; mouse.x=e.clientX; mouse.y=e.clientY; });
canvas.addEventListener(‘mouseup’,e=>{
if(mouse.down&&Math.hypot(e.clientX-mouse.px,e.clientY-mouse.py)<14)clickQ.push({x:e.clientX,y:e.clientY});
mouse.down=false; mouse.dx=0; mouse.dy=0;
});
canvas.addEventListener(‘mousemove’,e=>{ mouse.dx=e.clientX-mouse.x; mouse.dy=e.clientY-mouse.y; mouse.x=e.clientX; mouse.y=e.clientY; });

canvas.addEventListener(‘touchstart’,e=>{
e.preventDefault();
for(const t of e.changedTouches){
activeTouches[t.identifier]={x:t.clientX,y:t.clientY,sx:t.clientX,sy:t.clientY};
// Assign to joystick if in joystick zone
if(!JOY.active && Math.hypot(t.clientX-JOY.bx,t.clientY-JOY.by)<JOY.radius*1.8 && state===S.FLIGHT){
JOY.active=true; JOY.tid=t.identifier;
JOY.cx=t.clientX; JOY.cy=t.clientY;
}
mouse.px=mouse.x; mouse.py=mouse.y; mouse.x=t.clientX; mouse.y=t.clientY; mouse.down=true;
}
},{passive:false});

canvas.addEventListener(‘touchmove’,e=>{
e.preventDefault();
for(const t of e.changedTouches){
if(activeTouches[t.identifier]){ activeTouches[t.identifier].x=t.clientX; activeTouches[t.identifier].y=t.clientY; }
if(t.identifier===JOY.tid){
const dx=t.clientX-JOY.bx, dy=t.clientY-JOY.by;
const dist=Math.hypot(dx,dy);
const clamped=Math.min(dist,JOY.radius);
const ang=Math.atan2(dy,dx);
JOY.cx=JOY.bx+Math.cos(ang)*clamped;
JOY.cy=JOY.by+Math.sin(ang)*clamped;
JOY.dx=Math.cos(ang)*(clamped/JOY.radius);
JOY.dy=Math.sin(ang)*(clamped/JOY.radius);
} else {
mouse.dx=t.clientX-mouse.x; mouse.dy=t.clientY-mouse.y;
mouse.x=t.clientX; mouse.y=t.clientY;
}
}
},{passive:false});

canvas.addEventListener(‘touchend’,e=>{
e.preventDefault();
for(const t of e.changedTouches){
const td=activeTouches[t.identifier];
if(td&&Math.hypot(t.clientX-td.sx,t.clientY-td.sy)<16)clickQ.push({x:t.clientX,y:t.clientY});
delete activeTouches[t.identifier];
if(t.identifier===JOY.tid){ JOY.active=false; JOY.tid=-1; JOY.dx=0; JOY.dy=0; JOY.cx=JOY.bx; JOY.cy=JOY.by; }
}
mouse.down=Object.keys(activeTouches).length>0;
if(!mouse.down){mouse.dx=0;mouse.dy=0;}
},{passive:false});

// Device tilt
const tilt={b:0,g:0,cal:false,b0:0,g0:0};
window.addEventListener(‘deviceorientation’,e=>{
if(!tilt.cal){tilt.b0=e.beta||0;tilt.g0=e.gamma||0;tilt.cal=true;}
tilt.b=tilt.b*0.78+(((e.beta||0)-tilt.b0))*0.22;
tilt.g=tilt.g*0.78+(((e.gamma||0)-tilt.g0))*0.22;
});

function inBox(mx,my,cx,cy,w,h){return mx>=cx-w/2&&mx<=cx+w/2&&my>=cy-h/2&&my<=cy+h/2;}
function inCirc(mx,my,cx,cy,r){return (mx-cx)**2+(my-cy)**2<r*r;}
function isHov(cx,cy,w,h){return inBox(mouse.x,mouse.y,cx,cy,w,h);}
function isHovC(cx,cy,r){return inCirc(mouse.x,mouse.y,cx,cy,r);}

// ── ACTION BUTTONS STATE ─────────────────────────────────────
const ABTN={boost:false,breath:false,up:false,down:false};

function updateActionButtons(){
// Reset each frame — set true if any touch is over button
ABTN.boost=false; ABTN.breath=false; ABTN.up=false; ABTN.down=false;
if(state!==S.FLIGHT)return;
const br=BTN_REGIONS();
for(const tid in activeTouches){
const t=activeTouches[tid];
if(parseInt(tid)===JOY.tid)continue;
if(inCirc(t.x,t.y,br.boost.x,br.boost.y,br.boost.r))ABTN.boost=true;
if(inCirc(t.x,t.y,br.breath.x,br.breath.y,br.breath.r))ABTN.breath=true;
if(inCirc(t.x,t.y,br.up.x,br.up.y,br.up.r))ABTN.up=true;
if(inCirc(t.x,t.y,br.down.x,br.down.y,br.down.r))ABTN.down=true;
// mouse
}
// Also mouse for desktop
if(mouse.down){
if(inCirc(mouse.x,mouse.y,br.boost.x,br.boost.y,br.boost.r))ABTN.boost=true;
if(inCirc(mouse.x,mouse.y,br.breath.x,br.breath.y,br.breath.r))ABTN.breath=true;
if(inCirc(mouse.x,mouse.y,br.up.x,br.up.y,br.up.r))ABTN.up=true;
if(inCirc(mouse.x,mouse.y,br.down.x,br.down.y,br.down.r))ABTN.down=true;
}
}

function BTN_REGIONS(){
const br=52;
return {
boost: {x:W-br-14,      y:H-br-14,      r:br},
breath:{x:W-br*2.3-14,  y:H-br-14,      r:br},
up:    {x:W-br-14,      y:H-br*2.6-14,  r:br*0.78},
down:  {x:W-br*2.3-14,  y:H-br*2.6-14,  r:br*0.78},
};
}

// ── AUDIO ────────────────────────────────────────────────────
let AC=null;
function initAudio(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function tone(f,d,t=‘sine’,v=0.28){
if(!AC)return;
try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}
}
function whoosh(){
if(!AC)return;
try{const b=AC.createBuffer(1,AC.sampleRate*0.28,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*0.55;const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();f.type=‘bandpass’;f.frequency.value=1100;f.Q.value=0.7;s.buffer=b;s.connect(f);f.connect(g);g.connect(AC.destination);g.gain.value=0.13;s.start();}catch(e){}
}
function fanfare(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.28,‘triangle’,0.32),i*100));}
function pClick(){tone(660,0.06,‘square’,0.09);}
function pSuccess(){tone(880,0.14,‘sine’,0.22);setTimeout(()=>tone(1100,0.18,‘sine’,0.22),110);}
function pBreath(f){if(!AC)return;tone(f,0.3,‘sawtooth’,0.2);tone(f*1.5,0.3,‘sine’,0.09);}

// ── PARTICLES ────────────────────────────────────────────────
const P=[];let hue=0;
function addP(x,y,vx,vy,life,color,size,grav=0){P.push({x,y,vx,vy,life,ml:life,color,size,grav});}
function boom(x,y,col,n=12,spd=3){for(let i=0;i<n;i++){const a=i/n*Math.PI*2+Math.random()*0.4,s=spd*(0.5+Math.random());addP(x,y,Math.cos(a)*s,Math.sin(a)*s,0.7+Math.random()*0.5,col,3+Math.random()*4);}}
function trailP(x,y,col,sz=4){addP(x,y,(Math.random()-0.5)*0.5,(Math.random()-0.5)*0.4-0.2,0.38+Math.random()*0.28,col,sz);}
function rainbowP(x,y){hue=(hue+4)%360;addP(x,y,(Math.random()-0.5)*0.9,-Math.random()*1.1,0.5,`hsl(${hue},100%,65%)`,5+Math.random()*5);}
function updP(dt){for(let i=P.length-1;i>=0;i–){const p=P[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.life-=dt;if(p.life<=0)P.splice(i,1);}}
function drawP(){for(const p of P){ctx.save();ctx.globalAlpha=Math.max(0,p.life/p.ml)*0.82;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.5,p.size*(p.life/p.ml)),0,Math.PI*2);ctx.fill();ctx.restore();}}

// ── DRAW HELPERS ─────────────────────────────────────────────
function rr(x,y,w,h,r=10){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function bar(x,y,w,h,pct,col,bg=’#222’){ctx.fillStyle=bg;rr(x,y,w,h,h/2);ctx.fill();if(pct>0){ctx.fillStyle=col;rr(x,y,Math.max(h,w*Math.min(1,pct)),h,h/2);ctx.fill();}}
function txt(s,x,y,sz,col,align=‘center’,weight=‘bold’){ctx.save();ctx.font=`${weight} ${sz}px 'Georgia',serif`;ctx.fillStyle=col;ctx.textAlign=align;ctx.fillText(s,x,y);ctx.restore();}
function txti(s,x,y,sz,col,align=‘center’){ctx.save();ctx.font=`italic ${sz}px 'Georgia',serif`;ctx.fillStyle=col;ctx.textAlign=align;ctx.fillText(s,x,y);ctx.restore();}
function glow(s,x,y,sz,col,gc,blur=14){ctx.save();ctx.font=`bold ${sz}px 'Georgia',serif`;ctx.shadowColor=gc;ctx.shadowBlur=blur;ctx.fillStyle=col;ctx.textAlign=‘center’;ctx.fillText(s,x,y);ctx.restore();}
function btn(label,cx,cy,w,h,col,hov=false,r=h/2){
const x=cx-w/2,y=cy-h/2;
const g2=ctx.createLinearGradient(x,y,x,y+h);
g2.addColorStop(0,hov?lc(col,35):lc(col,12));g2.addColorStop(1,col);
ctx.fillStyle=g2;rr(x,y,w,h,r);ctx.fill();
ctx.strokeStyle=lc(col,45);ctx.lineWidth=1.5;rr(x,y,w,h,r);ctx.stroke();
txt(label,cx,cy+h*0.15,Math.min(h*0.42,15),’#fff’);
}
function lc(hex,a){try{let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}catch(e){return hex;}}
function dc(hex,a){try{let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;}catch(e){return hex;}}

// ── STARS ────────────────────────────────────────────────────
const stars=[];
(()=>{for(let i=0;i<250;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.6+0.3,s:Math.random()*0.9+0.3});})();
function drawStars(a=1,gt=0){ctx.save();ctx.globalAlpha=a;for(const s of stars){const br=0.4+0.6*Math.sin(gt*s.s+s.x*9);ctx.fillStyle=`rgba(255,255,255,${br*0.72})`;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();}ctx.restore();}

let flight=null;
function createFlight(drg,city){
return {
drg,city,x:W*0.3,y:H*0.48,
vx:drg.maxS*0.28,vy:0,angle:0,tAngle:0,
speed:drg.maxS*0.32,wPhase:0,facing:1,
boost:0,breath:0,scrollX:0,scrollY:0,phase:0,
score:0,rings:0,time:0,totalTime:0,
mode:‘race’,raceFinished:false,
tricks:0,combo:0,comboTimer:0,
trailDots:[],thermal:0,
ringObjs: Array.from({length:12},(*,i)=>({x:W*0.85+i*(W*0.65+Math.random()*80),y:H*(0.22+Math.random()*0.56),r:42+Math.random()*24,passed:false,glow:0})),
coinObjs: Array.from({length:40},(*,i)=>({x:W*0.6+i*(W*0.38+Math.random()*100),y:H*(0.18+Math.random()*0.64),r:13,collected:false})),
paused:false,overlay:null,overlayTimer:0,
};
}
function updateFlight(f,dt){
if(f.paused||f.overlay)return;
f.phase+=dt*0.6; f.totalTime+=dt;
if(f.mode===‘race’)f.time+=dt;
const b=game.bond[f.drg.id]||{bond:50};
const st=game.stats[f.drg.id]||{speed:5,stamina:5,agility:5,power:5};
const sM=0.82+st.speed*0.036; const aM=0.82+st.agility*0.036; const bM=0.82+(b.bond/100)*0.36;
// Input aggregation
let pitchIn=0,rollIn=0,boostIn=false,breathIn=false;
if(keys[‘ArrowUp’]||keys[‘KeyW’])pitchIn=-1;
if(keys[‘ArrowDown’]||keys[‘KeyS’])pitchIn=1;
if(keys[‘ArrowLeft’]||keys[‘KeyA’])rollIn=-1;
if(keys[‘ArrowRight’]||keys[‘KeyD’])rollIn=1;
if(keys[‘Space’]||keys[‘ShiftLeft’])boostIn=true;
if(keys[‘KeyF’]||keys[‘KeyE’])breathIn=true;
// Joystick
if(JOY.active){rollIn+=JOY.dx;pitchIn+=JOY.dy;}
// Action buttons
if(ABTN.boost)boostIn=true;
if(ABTN.breath)breathIn=true;
if(ABTN.up)pitchIn-=0.85;
if(ABTN.down)pitchIn+=0.85;
// Clamp
rollIn=Math.max(-1,Math.min(1,rollIn));
pitchIn=Math.max(-1,Math.min(1,pitchIn));
// Steering
const tr=f.drg.turn*aM*bM*dt*60;
f.tAngle+=rollIn*tr*0.022+pitchIn*tr*0.016;
f.tAngle*=0.955; // auto-level
f.angle=f.angle*0.88+f.tAngle*0.12;
// Speed
const maxS=f.drg.maxS*sM*bM;
if(boostIn&&f.boost<=0){f.speed=Math.min(maxS,f.speed+300*dt);if(Math.random()<0.04)whoosh();}
else{const g2=-Math.sin(f.angle)*145;f.speed+=(g2-f.speed*f.drg.drag*60)*dt;f.speed=Math.max(f.drg.minS,Math.min(maxS,f.speed));}
// Thermal
f.thermal=Math.sin(f.totalTime*0.28+f.x*0.002)*0.5+0.5;
const lift=f.drg.lift*f.thermal*48*dt;
// Velocity
f.vx=f.vx*0.82+Math.cos(f.angle)*f.speed*0.18;
f.vy=f.vy*0.82+(Math.sin(f.angle)*f.speed-lift)*0.18;
f.wPhase+=dt*(f.drg.flap/120+Math.abs(f.vx)*0.002);
if(f.wPhase>Math.PI*20)f.wPhase-=Math.PI*20;
if(f.vx>6)f.facing=1;else if(f.vx<-6)f.facing=-1;
// Scroll
f.scrollX+=f.vx*dt; f.scrollY+=f.vy*dt;
f.y=Math.max(H*0.06,Math.min(H*0.93,f.y*0.89+(H*0.48+f.vy*0.07)*0.11));
f.x=f.x*0.9+(W*0.3+(f.vx-f.speed*0.28)*0.07)*0.1;
if(f.boost>0)f.boost-=dt;
if(f.breath>0)f.breath-=dt;
// Breath
if(breathIn&&f.breath<=0){
f.breath=0.55;pBreath(f.drg.id===‘nightfury’?440:f.drg.id===‘lung’?330:f.drg.id===‘oillipheist’?550:660);
boom(f.x+52*f.facing,f.y,f.drg.breath,18,4.5);f.score+=50;
if(f.drg.rainbow)for(let i=0;i<10;i++)rainbowP(f.x+50*f.facing+(Math.random()-0.5)*40,f.y+(Math.random()-0.5)*30);
}
// Trail
if(f.drg.rainbow){rainbowP(f.x-30*f.facing,f.y+Math.sin(f.wPhase)*4);if(Math.random()<0.35)rainbowP(f.x-22*f.facing+(Math.random()-0.5)*20,f.y+(Math.random()-0.5)*18);}
else trailP(f.x-30*f.facing,f.y,f.drg.trail);
// Trail history
f.trailDots.push({x:f.x,y:f.y});if(f.trailDots.length>28)f.trailDots.shift();
// Rings
for(const ring of f.ringObjs){
ring.glow=Math.max(0,ring.glow-dt*2.5);
if(ring.passed)continue;
const wx=ring.x-f.scrollX;const wy=ring.y-f.scrollY+H*0.5;
if(wx<-120||wx>W+120)continue;
if(inCirc(f.x,f.y,wx,wy,ring.r+10)){
ring.passed=true;ring.glow=1;f.rings++;f.score+=220;
boom(wx,wy,f.drg.acc,22,5.5);pSuccess();
if(f.drg.rainbow)for(let i=0;i<12;i++)rainbowP(wx+(Math.random()-0.5)*70,wy+(Math.random()-0.5)*50);
}
}
// Coins
for(const coin of f.coinObjs){
if(coin.collected)continue;
const wx=coin.x-f.scrollX;const wy=coin.y-f.scrollY+H*0.5;
if(wx<-70||wx>W+70)continue;
if(inCirc(f.x,f.y,wx,wy,coin.r+14)){
coin.collected=true;f.score+=35;
tone(880+f.rings*22,0.1,‘sine’,0.18);
addP(wx,wy,0,-2,0.5,’#ffee00’,9);
}
}
// Tricks
if(Math.abs(f.angle)>Math.PI*0.88){
f.comboTimer+=dt;
if(f.comboTimer>0.45){f.tricks++;f.combo++;f.score+=110*f.combo;f.comboTimer=0;boom(f.x,f.y,f.drg.acc,12,3.5);}
} else {f.comboTimer=0;if(f.combo>0&&(f.comboTimer+=dt)>1.2){f.combo=0;}}
// Race finish
if(f.mode===‘race’&&f.rings>=f.ringObjs.length&&!f.raceFinished){
f.raceFinished=true;const pb=game.best[f.city]||9999;
if(f.time<pb)game.best[f.city]=f.time;
game.flights++;saveGame();fanfare();f.overlay=‘result’;f.overlayTimer=5.5;
}
if(f.overlay===‘result’){f.overlayTimer-=dt;if(f.overlayTimer<=0){f.overlay=null;state=S.HUB;flight=null;}}
}

function drawFlight(f){
drawCityBg(f.city,f.scrollX,f.phase);
// Rings
for(const ring of f.ringObjs){
const wx=ring.x-f.scrollX;const wy=ring.y-f.scrollY+H*0.5;
if(wx<-130||wx>W+130)continue;
ctx.save();ctx.globalAlpha=ring.passed?0.22:0.88+0.08*Math.sin(f.phase*2.2);
ctx.strokeStyle=ring.passed?’#444’:f.drg.acc;
ctx.shadowColor=f.drg.acc;ctx.shadowBlur=ring.glow*32+6;ctx.lineWidth=5.5;
ctx.beginPath();ctx.arc(wx,wy,ring.r,0,Math.PI*2);ctx.stroke();
if(!ring.passed){ctx.globalAlpha=0.12;ctx.fillStyle=f.drg.acc;ctx.beginPath();ctx.arc(wx,wy,ring.r,0,Math.PI*2);ctx.fill();}
ctx.restore();
// Ring number if not passed
if(!ring.passed){const rn=f.ringObjs.filter((r,i)=>i<=f.ringObjs.indexOf(ring)).filter(r=>!r.passed).length;txt(rn>0?rn:’’,wx,wy+5,14,‘rgba(255,255,255,0.6)’);}
}
// Coins
for(const coin of f.coinObjs){
if(coin.collected)continue;
const wx=coin.x-f.scrollX;const wy=coin.y-f.scrollY+H*0.5;
if(wx<-65||wx>W+65)continue;
ctx.save();ctx.shadowColor=’#ffee00’;ctx.shadowBlur=12;
ctx.fillStyle=’#ffdd00’;ctx.strokeStyle=’#aa8800’;ctx.lineWidth=1.8;
ctx.beginPath();ctx.arc(wx,wy,coin.r,0,Math.PI*2);ctx.fill();ctx.stroke();
txt(‘✦’,wx,wy+4,11,’#ffe040’);
ctx.restore();
}
// Trail
ctx.save();ctx.lineWidth=3.5;ctx.lineCap=‘round’;
for(let i=1;i<f.trailDots.length;i++){
const a=i/f.trailDots.length;
if(f.drg.rainbow){hue=(hue+2)%360;ctx.strokeStyle=`hsla(${hue},100%,65%,${a*0.7})`;}
else ctx.strokeStyle=f.drg.trail;
ctx.globalAlpha=a*0.58;
ctx.beginPath();ctx.moveTo(f.trailDots[i-1].x,f.trailDots[i-1].y);ctx.lineTo(f.trailDots[i].x,f.trailDots[i].y);ctx.stroke();
}
ctx.restore();
// Breath
if(f.breath>0){
ctx.save();ctx.globalAlpha=f.breath*0.9;
const bx=f.x+72*f.facing;
const bg=ctx.createRadialGradient(f.x+42*f.facing,f.y,3,bx,f.y,65);
bg.addColorStop(0,f.drg.breath);bg.addColorStop(1,‘transparent’);
ctx.fillStyle=bg;ctx.beginPath();ctx.arc(bx,f.y,65,0,Math.PI*2);ctx.fill();
ctx.restore();
}
// Dragon
const ds=Math.min(W/640,H/360)*1.1;
drawDragonAt(f.drg,f.x,f.y,ds,f.angle,f.wPhase,f.facing);
drawP();
drawFlightHUD(f);
drawJoystick();
drawFlightButtons();
if(f.combo>1){ctx.save();ctx.globalAlpha=Math.min(1,f.comboTimer>0.3?1:f.comboTimer/0.3);glow(`COMBO x${f.combo}!`,W/2,H*0.14,Math.min(H*0.045,32),f.drg.acc,f.drg.acc,20);ctx.restore();}
if(f.paused)drawPauseOverlay(f);
if(f.overlay===‘result’)drawResultOverlay(f);
}

ctx.beginPath();ctx.arc(JOY.cx,JOY.cy,JOY.knobR,0,Math.PI*2);ctx.stroke();

let training=null;
function createTraining(drg,cityId,gameType){
const city=CITIES.find(c=>c.id===cityId)||CITIES[0];
const t={drg,city,gameType,timer:32,done:false,score:0,phase:0,result:null};
if(gameType===‘feeding’){t.foodQ=(city.foods||[‘Food’]).concat(city.foods||[‘Food’]).slice(0,5);t.foodIdx=0;}
if(gameType===‘grooming’){
const cx=W/2,cy=H*0.45;
t.spots=[{dx:-32,dy:-8},{dx:22,dy:-22},{dx:2,dy:14},{dx:44,dy:4},{dx:-52,dy:4},{dx:28,dy:-36}].map((o,i)=>({x:cx+o.dx,y:cy+o.dy,r:22,glow:0,done:false}));
}
if(gameType===‘fetch’){t.throwX=W*0.6;t.throwY=H*0.5;t.thrown=false;t.meter=0;t.charging=false;t.fetchCount=0;}
if(gameType===‘lair’){
const trs=city.treas||[‘Treasure’];
t.treasures=trs.map((n,i)=>({name:n,px:55+i*88,py:H*0.83,w:74,h:42,placed:false,dragging:false}));
t.zones=trs.map((_,i)=>({x:W*0.38+i*82,y:H*0.55,w:68,h:42,filled:false}));
}
return t;
}
function updateTraining(t,dt){
if(t.done)return;
t.timer-=dt;t.phase+=dt;
if(t.timer<=0){t.timer=0;finishTraining(t);return;}
if(t.gameType===‘feeding’){
for(let ci=0;ci<clickQ.length;ci++){
if(inBox(clickQ[ci].x,clickQ[ci].y,W/2,H*0.76,190,56)){
clickQ.splice(ci,1);pSuccess();boom(W/2,H*0.76,t.drg.acc,12,3);
t.score+=85;t.foodIdx++;
if(t.foodIdx>=t.foodQ.length){finishTraining(t);return;}
}
}
}
if(t.gameType===‘grooming’){
t.spots.forEach(sp=>{sp.glow=inCirc(mouse.x,mouse.y,sp.x,sp.y,sp.r+10)?Math.min(1,sp.glow+dt*3):Math.max(0,sp.glow-dt*2);});
for(let ci=0;ci<clickQ.length;ci++){
const hit=t.spots.find(sp=>!sp.done&&inCirc(clickQ[ci].x,clickQ[ci].y,sp.x,sp.y,sp.r+14));
if(hit){clickQ.splice(ci,1);ci–;hit.done=true;t.score+=65;pSuccess();boom(hit.x,hit.y,t.drg.acc,9,2.5);}
}
if(t.spots.every(s=>s.done))finishTraining(t);
}
if(t.gameType===‘fetch’){
if(!t.thrown){
if(mouse.down&&mouse.y<H*0.72&&mouse.x>W*0.15&&mouse.x<W*0.75)t.meter=Math.min(1,(t.meter||0)+dt*1.3);
if(!mouse.down&&t.meter>0.08){
t.thrown=true;t.tvx=(mouse.x-W*0.22)*1.4;t.tvy=(mouse.y-H*0.5)*1.3;
t.throwX=W*0.22;t.throwY=H*0.5;whoosh();
}
} else {
t.throwX+=t.tvx*dt;t.throwY+=t.tvy*dt;t.tvy+=190*dt;
if(t.throwY>H*0.77){t.thrown=false;t.fetchCount++;t.score+=55+Math.round(t.meter*110);boom(t.throwX,H*0.77,t.drg.acc,16,4);pSuccess();t.meter=0;}
}
if(t.fetchCount>=4)finishTraining(t);
}
if(t.gameType===‘lair’){
for(let ci=0;ci<clickQ.length;ci++){
let removed=false;
t.treasures.forEach(tr=>{
if(!tr.placed&&!removed&&inBox(clickQ[ci].x,clickQ[ci].y,tr.px,tr.py,tr.w,tr.h)){
tr.dragging=!tr.dragging;clickQ.splice(ci,1);ci–;removed=true;
}
});
}
t.treasures.forEach(tr=>{
if(tr.dragging){tr.px=mouse.x;tr.py=mouse.y;}
if(!tr.placed&&!mouse.down&&tr.dragging){
const z=t.zones.find(z=>!z.filled&&inBox(tr.px,tr.py,z.x,z.y,z.w+20,z.h+20));
if(z){z.filled=true;tr.placed=true;tr.dragging=false;tr.px=z.x;tr.py=z.y;t.score+=75;pSuccess();boom(z.x,z.y,t.drg.acc,12,3);}
else tr.dragging=false;
}
});
if(t.treasures.every(tr=>tr.placed))finishTraining(t);
}
}
function finishTraining(t){
if(t.done)return;t.done=true;
initBond(t.drg.id);
const b=game.bond[t.drg.id];const st=game.stats[t.drg.id];
const gain=Math.min(10,t.score/55);
b.bond=Math.min(100,b.bond+gain);b.hunger=Math.min(100,b.hunger+(t.gameType===‘feeding’?22:5));
b.affection=Math.min(100,b.affection+(t.gameType===‘grooming’||t.gameType===‘fetch’?16:5));
if(t.gameType===‘feeding’)st.stamina=Math.min(10,st.stamina+0.32);
if(t.gameType===‘grooming’)st.agility=Math.min(10,st.agility+0.32);
if(t.gameType===‘fetch’)st.speed=Math.min(10,st.speed+0.32);
if(t.gameType===‘lair’)st.power=Math.min(10,st.power+0.32);
t.result={score:t.score,gain:gain.toFixed(1)};
fanfare();saveGame();
}

conn.forEach(([a,b])=>{

CITIES.forEach((city,i)=>{

if(!unlocked)txt(‘🔒’,cx2,cy2-8,15,’#666’);
ctx.restore();
for(let ci=0;ci<clickQ.length;ci++){
if(inCirc(clickQ[ci].x,clickQ[ci].y,cx2,cy2,38)){
clickQ.splice(ci,1);
if(unlocked){pClick();hub=createHub(city.id);game.city=city.id;state=S.HUB;}else{pClick();tone(200,0.2,‘sine’,0.12);}
break;
}
}
});
ctx.fillStyle=‘rgba(0,0,0,0.45)’;rr(12,H-62,265,52,10);ctx.fill();
txt(‘🟢 Unlocked  |  🔒 Locked’,143,H-42,12,’#8899aa’);
txt(‘Tap any realm to enter & fly’,143,H-22,12,’#556688’);

ctx.fillStyle=‘rgba(0,0,0,0.6)’;rr(px,H*0.14,pw,H*0.7,16);ctx.fill();
ctx.strokeStyle=’#6a4a22’;ctx.lineWidth=1.8;rr(px,H*0.14,pw,H*0.7,16);ctx.stroke();

drawDragonAt(dr,px+pw-58,H*0.26,ds,0,Date.now()*0.002,1);

glow(e.title,W/2-30,H*0.205,Math.min(H*0.032,22),’#d4c08c’,’#aa8844’,10);
ctx.fillStyle=‘rgba(170,120,50,0.2)’;rr(px+12,H*0.225,pw-24,22,6);ctx.fill();
txt(’[ ‘+e.cat+’ ]’,W/2,H*0.237,12,’#8a6a4a’);
// Quote block
const qy=H*0.265;ctx.fillStyle=‘rgba(80,50,10,0.22)’;rr(px+12,qy,pw-24,H*0.14,8);ctx.fill();
ctx.strokeStyle=’#6a4a22’;ctx.lineWidth=1;rr(px+12,qy,pw-24,H*0.14,8);ctx.stroke();
// Decorative quote marks
ctx.save();ctx.globalAlpha=0.25;ctx.font=`bold ${Math.min(H*0.09,60)}px Georgia,serif`;ctx.fillStyle=’#aa8844’;
ctx.textAlign=‘left’;ctx.fillText(’”’,px+16,qy+H*0.11);
ctx.textAlign=‘right’;ctx.fillText(’”’,px+pw-12,qy+H*0.12);ctx.restore();
// Quote text  (wrapped)
wrapText(e.quote,px+30,qy+H*0.035,pw-60,H*0.11,16,‘italic’,’#d4b870’);
// Source line
ctx.fillStyle=‘rgba(200,150,80,0.18)’;rr(px+12,qy+H*0.145,pw-24,20,4);ctx.fill();
txt(e.source,W/2,qy+H*0.157,10.5,’#a0804a’);
// Main text
wrapText(e.text,px+16,qy+H*0.195,pw-32,H*0.32,13,‘normal’,’#c8b880’);
// Nav
const nhov=isHov(W/2-90,H*0.88,160,42);const phov=isHov(W/2+90,H*0.88,160,42);
btn(‘◀ Prev’,W/2-90,H*0.88,160,42,’#3a2a10’,nhov);btn(‘Next ▶’,W/2+90,H*0.88,160,42,’#3a2a10’,phov);
for(let ci=0;ci<clickQ.length;ci++){

if(inBox(clickQ[ci].x,clickQ[ci].y,W/2+90,H*0.88,160,42)){clickQ.splice(ci,1);codexIdx=(codexIdx+1)%CODEX.length;pClick();}
}
txt(`${codexIdx+1} / ${CODEX.length}`,W/2,H*0.95,13,’#6a4a22’);
const bhov=isHov(60,34,100,34);btn(‘← Back’,60,34,100,34,’#3a2a10’,bhov);
for(let ci=0;ci<clickQ.length;ci++){if(inBox(clickQ[ci].x,clickQ[ci].y,60,34,100,34)){clickQ.splice(ci,1);state=prevCodexState||S.MAP;pClick();break;}}
drawP();
}

function wrapText(text,x,y,maxW,maxH,size,style,color){
ctx.save();ctx.font=`${style} ${size}px 'Georgia',serif`;ctx.fillStyle=color;ctx.textAlign=‘left’;
const words=text.split(’ ‘);let line=’’;let cy=y;
for(const w of words){
const test=line+w+’ ‘;
if(ctx.measureText(test).width>maxW&&line!==’’){
ctx.fillText(line,x,cy);line=w+’ ’;cy+=size*1.42;
if(cy>y+maxH)break;
} else line=test;
}
if(line&&cy<=y+maxH)ctx.fillText(line,x,cy);
ctx.restore();
}

menuPhase+=0.011;menuDrIdx=(menuDrIdx+0.007)%DRAGONS.length;

ctx.fillStyle=g;ctx.fillRect(0,0,W,H);drawStars(1.0,menuPhase*30);
ctx.save();ctx.globalAlpha=0.15;
for(let i=0;i<6;i++){const cx2=((i*200+menuPhase*22)%(W+300))-100;const cy2=H*(0.14+i*0.055);ctx.fillStyle=’#8899bb’;ctx.beginPath();ctx.ellipse(cx2,cy2,72+i*10,22+i*4,0,0,Math.PI*2);ctx.fill();}

drawDragonAt(drg,W*0.8,H*0.5,ds,Math.sin(menuPhase*32)*0.08,menuPhase*110,1);

glow(‘DRAGONFLIGHT’,W/2,H*0.2,Math.min(H*0.072,54),’#d4c08c’,’#cc8833’,28);
glow(‘MYTHIC RIDERS’,W/2,H*0.305,Math.min(H*0.052,38),’#c89858’,’#aa6622’,18);
glow(‘✦  A E T H E R I A  ✦’,W/2,H*0.37,Math.min(H*0.026,19),’#8877aa’,’#443366’,10);
ctx.restore();
txt(‘10 Mythic Cities · Historical Dragon Mythology · Smooth Sky Flight’,W/2,H*0.43,Math.min(H*0.018,13),’#5566aa’);
const bw=Math.min(W*0.56,285);
const items=[
{l:game.dragon?‘▶ Continue’:‘🐉 New Rider’, y:H*0.52,col:’#1a3a5a’,a:()=>{initAudio();if(game.dragon){hub=createHub(game.city);state=S.MAP;}else state=S.SELECT;}},
{l:‘🗺 World Map’,y:H*0.595,col:’#1a3a1a’,a:()=>{initAudio();state=S.MAP;}},
{l:‘🐉 Choose Dragon’,y:H*0.67,col:’#2a2a4a’,a:()=>{initAudio();state=S.SELECT;}},
{l:‘📖 Dragon Codex’,y:H*0.745,col:’#3a2a12’,a:()=>{initAudio();prevCodexState=S.MENU;state=S.CODEX;initCodex();}},
];
items.forEach(b=>{
const hov=isHov(W/2,b.y,bw,50);
ctx.save();ctx.shadowColor=drg.acc;ctx.shadowBlur=hov?16:0;btn(b.l,W/2,b.y,bw,50,b.col,hov);ctx.restore();
for(let ci=0;ci<clickQ.length;ci++){if(inBox(clickQ[ci].x,clickQ[ci].y,W/2,b.y,bw,50)){clickQ.splice(ci,1);b.a();pClick();break;}}
});
if(game.flights>0)txt(`Flights: ${game.flights}  ·  Cities explored: ${game.unlocked.size}/10`,W/2,H*0.84,12,’#444’);
// Mobile controls hint
ctx.fillStyle=‘rgba(0,0,0,0.42)’;rr(12,H-46,W-24,36,8);ctx.fill();
txt(‘📱 Virtual Joystick + Buttons  |  ⌨️ WASD/Arrows + Space + F  |  🎮 Device Tilt’,W/2,H-24,11,’#445566’);
drawP();
}

// ================================================================
//  MAIN GAME LOOP
// ================================================================
let lastT=performance.now();

function loop(now){
requestAnimationFrame(loop);
const dt=Math.min((now-lastT)/1000,0.05);
lastT=now;
game.t+=dt;hue=(hue+dt*40)%360;
updP(dt);
updateActionButtons();
ctx.clearRect(0,0,W,H);
switch(state){
case S.MENU:   drawMenu();  break;
case S.SELECT: drawSelect();break;
case S.MAP:    drawMap();   break;
case S.HUB:    if(hub)drawHub(hub); break;
case S.TRAIN:  if(training){updateTraining(training,dt);drawTraining(training);}break;
case S.FLIGHT: if(flight){updateFlight(flight,dt);drawFlight(flight);}break;
case S.CODEX:  drawCodex(); break;
}
// Flush unhandled clicks
if(clickQ.length>0)clickQ.length=0;
}

// Pause key
window.addEventListener(‘keydown’,e=>{
if(state===S.FLIGHT&&flight){
if(e.code===‘KeyP’||e.code===‘Escape’){
if(!keys._pauseThisFrame){flight.paused=!flight.paused;keys._pauseThisFrame=true;}
}
}
});
window.addEventListener(‘keyup’,e=>{if(e.code===‘KeyP’||e.code===‘Escape’)keys._pauseThisFrame=false;});

requestAnimationFrame(loop);

</script>
